/* ================================================================
   SIMPLE HASH (browser-compatible, no plaintext storage)
================================================================ */
function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash |= 0;
  }
  return 'h' + Math.abs(hash).toString(36);
}

/* ================================================================
   STORAGE (in-memory + localStorage)
================================================================ */
const _mem = {};
const Store = {
  get(k) {
    try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; }
    catch { return _mem[k] || null; }
  },
  set(k, v) {
    try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
    _mem[k] = v;
  },

  // Users DB: { [id]: { role, passwordHash, name } }
  getUsers() { return this.get('rtu_users_v2') || {}; },
  setUsers(u) { this.set('rtu_users_v2', u); },

  // Evals: keyed by studentId → { [classCode]: EvalRecord }
  getEvals(studentId) { return this.get('rtu_evals_' + studentId) || {}; },
  saveEval(studentId, classCode, data) {
    const evals = this.getEvals(studentId);
    if (!evals[classCode]) { // prevent duplicates
      evals[classCode] = { ...data, classCode };
      this.set('rtu_evals_' + studentId, evals);
    }
  },
  getEval(studentId, classCode) { return this.getEvals(studentId)[classCode] || null; },

  // Admin: get all eval records (anonymized) for a facultyId
  getAllEvalsForFaculty(facultyId) {
    const users = this.getUsers();
    const results = [];
    // Iterate all student keys in localStorage
    const keys = [];
    try { for (let i = 0; i < localStorage.length; i++) keys.push(localStorage.key(i)); }
    catch { Object.keys(_mem).forEach(k => keys.push(k)); }
    keys.filter(k => k && k.startsWith('rtu_evals_')).forEach(k => {
      const studentId = k.replace('rtu_evals_', '');
      const evals = this.get(k) || {};
      Object.values(evals).forEach(ev => {
        const subj = SUBJECTS.find(s => s.classCode === ev.classCode);
        if (subj && subj.facultyId === facultyId) {
          results.push({ ...ev }); // anonymous – no studentId
        }
      });
    });
    return results;
  },

  // Admin: get all evals across all students (anonymized)
  getAllEvals() {
    const results = [];
    const keys = [];
    try { for (let i = 0; i < localStorage.length; i++) keys.push(localStorage.key(i)); }
    catch { Object.keys(_mem).forEach(k => keys.push(k)); }
    keys.filter(k => k && k.startsWith('rtu_evals_')).forEach(k => {
      const evals = this.get(k) || {};
      Object.values(evals).forEach(ev => results.push({ ...ev }));
    });
    return results;
  },

  // Count distinct students who completed all evals
  getCompletedStudentCount() {
    let count = 0;
    const keys = [];
    try { for (let i = 0; i < localStorage.length; i++) keys.push(localStorage.key(i)); }
    catch { Object.keys(_mem).forEach(k => keys.push(k)); }
    keys.filter(k => k && k.startsWith('rtu_evals_')).forEach(k => {
      const evals = this.get(k) || {};
      if (Object.keys(evals).length >= SUBJECTS.length) count++;
    });
    return count;
  },
  getTotalSubmissions() {
    let count = 0;
    const keys = [];
    try { for (let i = 0; i < localStorage.length; i++) keys.push(localStorage.key(i)); }
    catch { Object.keys(_mem).forEach(k => keys.push(k)); }
    keys.filter(k => k && k.startsWith('rtu_evals_')).forEach(k => {
      const evals = this.get(k) || {};
      count += Object.keys(evals).length;
    });
    return count;
  }
};

  ];
  facultyDefaults.forEach(f => {
    if (!users[f.id]) {
      users[f.id] = { role:'faculty', passwordHash: simpleHash(f.pw), name: f.name };
      changed = true;
    }
  });

  // Admin account
  if (!users['admin']) {
    users['admin'] = { role:'admin', passwordHash: simpleHash('admin123'), name:'System Administrator' };
    changed = true;
  }

  if (changed) Store.setUsers(users);
}

/* ================================================================
   AUTH MODULE
================================================================ */
const Auth = {
  detectRole(id) {
    id = id.trim();
    if (/^\d{4}-\d+$/.test(id)) return 'student';
    if (/^FAC-\d+$/i.test(id)) return 'faculty';
    if (id.toLowerCase() === 'admin') return 'admin';
    return null;
  },

  normalizeStudentId(id) {
    return id.trim().toUpperCase();
  },

  login(id, password) {
    id = id.trim();
    const role = this.detectRole(id);
    if (!role) return { success: false, error: 'Invalid username format.' };

    if (role === 'student') {
      const sid = this.normalizeStudentId(id);
      const users = Store.getUsers();
      if (users[sid]) {
        // has custom password
        if (users[sid].passwordHash !== simpleHash(password)) {
          return { success: false, error: 'Invalid credentials.' };
        }
      } else {
        // default: student number format + default password
        if (!/^\d{4}-\d+$/.test(id)) return { success: false, error: 'Invalid student number.' };
        if (password !== '123456789') return { success: false, error: 'Invalid credentials.' };
        // create student record
        users[sid] = { role: 'student', passwordHash: simpleHash('123456789'), name: sid };
        Store.setUsers(users);
      }
      return { success: true, role: 'student', id: sid };
    }

    const users = Store.getUsers();
    const upper = role === 'faculty' ? id.toUpperCase() : id.toLowerCase();
    const key = role === 'faculty' ? id.toUpperCase() : 'admin';
    const record = users[key] || users[id];
    if (!record) return { success: false, error: 'Account not found.' };
    if (record.passwordHash !== simpleHash(password)) return { success: false, error: 'Invalid credentials.' };
    return { success: true, role: record.role, id: key, name: record.name };
  },

  changePassword(id, currentPw, newPw) {
    id = id.trim();
    const role = this.detectRole(id);
    if (!role) return { success: false, error: 'Invalid username format.' };

    const users = Store.getUsers();
    let key = id;
    if (role === 'student') key = this.normalizeStudentId(id);
    if (role === 'faculty') key = id.toUpperCase();
    if (role === 'admin') key = 'admin';

    const record = users[key];
    if (!record && role === 'student') {
      // first time change from default
      if (currentPw !== '123456789') return { success: false, error: 'Current password is incorrect.' };
    } else if (!record) {
      return { success: false, error: 'Account not found.' };
    } else {
      const expectedHash = record ? record.passwordHash : simpleHash('123456789');
      if (expectedHash !== simpleHash(currentPw)) return { success: false, error: 'Current password is incorrect.' };
    }

    if (newPw === currentPw) return { success: false, error: 'New password must differ from current password.' };
    if (newPw.length < 6) return { success: false, error: 'Password must be at least 6 characters.' };

    const existing = users[key] || { role, name: key };
    users[key] = { ...existing, passwordHash: simpleHash(newPw) };
    Store.setUsers(users);
    return { success: true };
  }
};

function genRefNo() {
  const d = new Date();
  const prefix = String(d.getFullYear()).slice(2) + String(d.getMonth()+1).padStart(2,'0');
  const suffix = Math.floor(Math.random()*900000)+100000;
  return prefix + '-' + suffix;
}

function doLogin() {
  const id = (document.getElementById('loginId')||{}).value || '';
  const pw = (document.getElementById('loginPw')||{}).value || '';
  if (!id.trim() || !pw) { renderLogin('Please enter all required fields.'); return; }

  const result = Auth.login(id, pw);
  if (!result.success) { renderLogin(result.error); return; }

  AppState.login(result.role, result.id, result.name);

  if (result.role === 'student') {
    if (isAllEvaluated(result.id)) renderReceipt();
    else renderSubjectSelect();
  } else if (result.role === 'faculty') {
    renderFacultyDashboard();
  } else {
    renderAdminDashboard();
  }
}

          </div>

          ${errMsg ? `<div class="text-xs text-red-600 text-center min-h-4">${escHTML(errMsg)}</div>` : ''}
          ${okMsg  ? `<div class="text-xs text-green-600 text-center min-h-4 font-bold">${escHTML(okMsg)}</div>` : ''}

          <button onclick="doChangePassword()" class="w-full py-3 rounded-xl text-sm font-bold text-white cursor-pointer mt-1" style="background:#003087">Update Password</button>
          <button onclick="renderLogin()" class="w-full py-2 text-sm font-bold cursor-pointer" style="background:none;border:none;color:#6B7280">← Back to Login</button>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById('fpId').focus();
}

function doChangePassword() {
  const id      = document.getElementById('fpId').value.trim();
  const current = document.getElementById('fpCurrent').value;
  const nw      = document.getElementById('fpNew').value;
  const confirm = document.getElementById('fpConfirm').value;

  if (!id || !current || !nw || !confirm) { renderForgotPassword('All fields are required.'); return; }
  if (nw !== confirm) { renderForgotPassword('New passwords do not match.'); return; }
  if (nw.length < 6) { renderForgotPassword('New password must be at least 6 characters.'); return; }

  const result = Auth.changePassword(id, current, nw);
  if (!result.success) { renderForgotPassword(result.error); return; }

  renderForgotPassword('', 'Password updated successfully! Redirecting to login…');
  setTimeout(() => renderLogin(), 1800);
}

function setScore(btn, criterion, score) {
  AppState.liveScores[criterion] = score;
  const container = btn.closest('.flex.gap-1');

    b.classList.remove('selected');
    b.style.background = '#EFF3FA';
    b.style.color = '#6B7280';
  });
  btn.classList.add('selected');
  btn.style.background = '#003087';
  btn.style.color = 'white';
}

function doSubmit(rowIdx) {
  const s = SUBJECTS[rowIdx];
  const unrated = ALL_CRITERIA.filter(c => !AppState.liveScores[c]);
  if (unrated.length > 0) {
    document.getElementById('evalErr').textContent = `${unrated.length} criterion(a) not yet rated. Please rate all items.`;
    return;
  }
  const comments = (document.getElementById('evalComments').value||'').trim();
  if (!comments) {
    document.getElementById('evalErr').textContent = 'Comments & Suggestions are required. Please provide your feedback.';
    document.getElementById('evalComments').style.borderColor = '#DC2626';
    return;
  }

  // Save (Store.saveEval prevents duplicates internally)
  Store.saveEval(AppState.userId, s.classCode, {
    scores: { ...AppState.liveScores },
    comments,
    refNo: genRefNo(),
    ts: Date.now()
  });
  AppState.liveScores = {};
  renderSuccess(rowIdx);
}

function saveReceiptPDF() {
  const evals = Store.getEvals(AppState.userId);
  const studentId = AppState.userId;
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
    doc.setFillColor(0,48,135); doc.rect(0,0,297,22,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(255,215,0);
    doc.text('RIZAL TECHNOLOGICAL UNIVERSITY',148,9,{align:'center'});
    doc.setFontSize(9); doc.setTextColor(255,255,255);
    doc.text('Faculty Evaluation System — Evaluation Receipt',148,16,{align:'center'});
    doc.setTextColor(30,30,30); doc.setFont('helvetica','normal'); doc.setFontSize(9);
    let y = 30;
    const info = [
      ['Current School Year:', SCHOOL_YEAR], ['Current Semester:', SEMESTER],
      ['Student:', studentId], ['Course / Year Level:', COURSE],
      ['Evaluation Schedule:', 'No Schedule of Evaluation'],
    ];
    info.forEach(([lbl,val]) => {
      doc.setFont('helvetica','bold'); doc.text(lbl,14,y);
      doc.setFont('helvetica','normal'); doc.text(val,70,y); y += 6;
    });
    doc.setFont('helvetica','bold'); doc.setTextColor(0,48,135);
    doc.text('Screenshot your faculty evaluation process for clearance purposes.',14,y+2);

    // Deduplicated rows
    const seenCodes = new Set();
    const uniqueSubjects = SUBJECTS.filter(s => { if(seenCodes.has(s.classCode)) return false; seenCodes.add(s.classCode); return true; });
    const rows = uniqueSubjects.map(s => {
      const ev = evals[s.classCode];
      return [s.no, s.classCode, s.subjectCode, s.description, s.faculty, 'EVALUATED', ev?ev.refNo:'—'];
    });
    doc.autoTable({
      head:[['No.','Class Code','Subject','Subject Description','Faculty','Status','Ref. No.']],
      body: rows, startY: y+10,
      styles:{ fontSize:8, cellPadding:2 },
      headStyles:{ fillColor:[74,74,74], textColor:[255,255,255], fontStyle:'bold' },
      alternateRowStyles:{ fillColor:[249,250,251] },
      columnStyles:{ 0:{cellWidth:12},1:{cellWidth:22},2:{cellWidth:22},3:{cellWidth:65},4:{cellWidth:48},5:{cellWidth:22},6:{cellWidth:35} }
    });
    doc.setFont('helvetica','italic'); doc.setTextColor(100); doc.setFontSize(7);
    doc.text(`Generated on ${new Date().toLocaleString()}`,14,doc.internal.pageSize.height-6);
    doc.save(`RTU_Evaluation_Receipt_${studentId}.pdf`);
  } catch(err) {
    alert('PDF library not loaded. Use Print to save as PDF instead.\n\n'+err.message);
  }
}

      <div class="text-sm mb-6" style="color:#6B7280">Welcome, ${escHTML(facultyName)}. View your assigned subjects and anonymous student feedback below.</div>

      <!-- Assigned Subjects -->
      <div class="section-bar text-sm font-bold mb-3" style="color:#003087">Assigned Subjects</div>
      <div class="rounded-xl overflow-hidden border mb-8" style="border-color:#D1D9E6">
        <table class="w-full border-collapse text-sm">
          <thead><tr style="background:#003087">
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Class Code</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Subject Code</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Description</th>
          </tr></thead>
          <tbody>${subjRows || '<tr><td colspan="3" class="px-3 py-4 text-center text-sm" style="color:#6B7280">No subjects assigned.</td></tr>'}</tbody>
        </table>
      </div>

      <!-- Anonymous Comments -->
      <div class="section-bar text-sm font-bold mb-3" style="color:#003087">Anonymous Student Comments <span class="ml-2 text-xs font-normal" style="color:#6B7280">(${allEvals.length} received)</span></div>
      <div class="rounded-xl p-4 mb-4" style="background:#E8F0FE;border:1.5px solid #003087">
        <div class="text-xs font-bold mb-1" style="color:#003087">📝 Privacy Notice</div>
        <div class="text-xs" style="color:#6B7280">All feedback below is completely anonymous. Student identities are never disclosed in this system.</div>
      </div>
      ${commentsHTML}
    </div>
  </div>`;
}

/* ================================================================
   VIEW: ADMIN DASHBOARD
================================================================ */
let adminFilterFaculty = 'all';
let adminFilterSubject = 'all';

function renderAdminDashboard() {
  if (AppState.role !== 'admin') { doLogout(); return; }

  const allEvals   = Store.getAllEvals();
  const totalSubs  = allEvals.length;
  const completed  = Store.getCompletedStudentCount();

  // Compute per-faculty averages
  const facultyStats = {};
  SUBJECTS.forEach(s => {
    if (!facultyStats[s.facultyId]) {
      facultyStats[s.facultyId] = { name: s.faculty, scores: [], comments: [], evalCount: 0 };
    }
  });
  allEvals.forEach(ev => {
    const subj = SUBJECTS.find(s => s.classCode === ev.classCode);
    if (!subj) return;
    const stats = facultyStats[subj.facultyId];
    if (!stats) return;
    const avg = ALL_CRITERIA.reduce((s,c) => s+(ev.scores[c]||0), 0) / ALL_CRITERIA.length;
    stats.scores.push(avg);
    if (ev.comments) stats.comments.push({ comment: ev.comments, subject: subj.description });
    stats.evalCount++;
  });

  const facultyRows = Object.entries(facultyStats)
    .filter(([id]) => adminFilterFaculty === 'all' || id === adminFilterFaculty)
    .map(([id, stats]) => {
      const avg = stats.scores.length ? (stats.scores.reduce((a,b)=>a+b,0)/stats.scores.length).toFixed(2) : 'N/A';
      const bar = stats.scores.length ? Math.round((parseFloat(avg)/5)*100) : 0;
      const color = parseFloat(avg) >= 4 ? '#16A34A' : parseFloat(avg) >= 3 ? '#D97706' : '#DC2626';
      return `<tr>
        <td class="px-3 py-2 font-bold" style="color:#1A1A2E">${escHTML(stats.name)}</td>
        <td class="px-3 py-2">${id}</td>
        <td class="px-3 py-2">${stats.evalCount}</td>
        <td class="px-3 py-2">
          <div class="flex items-center gap-2">
            <div class="flex-1 h-2 rounded-full" style="background:#EFF3FA">
              <div class="h-2 rounded-full" style="background:${color};width:${bar}%"></div>
            </div>
            <span class="font-bold text-sm" style="color:${color}">${avg}</span>
          </div>
        </td>
        <td class="px-3 py-2">
          <button onclick="adminViewComments('${id}')" class="px-3 py-1 rounded-lg text-xs font-bold cursor-pointer" style="background:#003087;color:white">View Comments</button>
        </td>
      </tr>`;
    }).join('');

  // Subject stats
  const subjectStats = {};
  SUBJECTS.forEach(s => { subjectStats[s.classCode] = { ...s, scores: [], count: 0 }; });
  allEvals.forEach(ev => {
    if (subjectStats[ev.classCode]) {
      const avg = ALL_CRITERIA.reduce((s,c) => s+(ev.scores[c]||0), 0) / ALL_CRITERIA.length;
      subjectStats[ev.classCode].scores.push(avg);
      subjectStats[ev.classCode].count++;
    }
  });
  const subjectRows = Object.values(subjectStats)
    .filter(s => adminFilterSubject === 'all' || s.classCode === adminFilterSubject)
    .map(s => {
      const avg = s.scores.length ? (s.scores.reduce((a,b)=>a+b,0)/s.scores.length).toFixed(2) : 'N/A';
      return `<tr>
        <td class="px-3 py-2">${s.classCode}</td>
        <td class="px-3 py-2">${s.subjectCode}</td>
        <td class="px-3 py-2">${s.description}</td>
        <td class="px-3 py-2">${s.faculty}</td>
        <td class="px-3 py-2">${s.count}</td>
        <td class="px-3 py-2 font-bold" style="color:#003087">${avg}</td>
      </tr>`;
    }).join('');

  const facultyOptions = Object.entries(facultyStats).map(([id,s]) => `<option value="${id}" ${adminFilterFaculty===id?'selected':''}>${escHTML(s.name)}</option>`).join('');
  const subjectOptions = Object.values(subjectStats).map(s => `<option value="${s.classCode}" ${adminFilterSubject===s.classCode?'selected':''}>${escHTML(s.subjectCode + ' — ' + s.description)}</option>`).join('');

  app().innerHTML = `<div class="flex flex-col min-h-screen fade-in">
    ${appHeader('Admin Dashboard')}
    <div class="flex-1 overflow-y-auto px-9 py-6">
      <div class="text-xl font-bold mb-1" style="color:#1A1A2E">Admin Analytics Dashboard</div>
      <div class="text-sm mb-6" style="color:#6B7280">${SCHOOL_YEAR} &nbsp;•&nbsp; ${SEMESTER}</div>

      <!-- KPI Cards -->
      <div class="grid grid-cols-3 gap-4 mb-8">
        <div class="rounded-2xl p-5 text-center" style="background:white;border:1.5px solid #D1D9E6">
          <div class="text-3xl font-bold" style="color:#003087">${totalSubs}</div>
          <div class="text-xs mt-1" style="color:#6B7280">Total Submissions</div>
        </div>
        <div class="rounded-2xl p-5 text-center" style="background:white;border:1.5px solid #D1D9E6">
          <div class="text-3xl font-bold" style="color:#16A34A">${completed}</div>
          <div class="text-xs mt-1" style="color:#6B7280">Students Completed</div>
        </div>
        <div class="rounded-2xl p-5 text-center" style="background:white;border:1.5px solid #D1D9E6">
          <div class="text-3xl font-bold" style="color:#D97706">${SUBJECTS.length}</div>
          <div class="text-xs mt-1" style="color:#6B7280">Subjects Monitored</div>
        </div>
      </div>

      <!-- Filters -->
      <div class="flex gap-4 mb-5 flex-wrap">
        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold" style="color:#1A1A2E">Filter by Faculty</label>
          <select onchange="adminFilterFaculty=this.value;renderAdminDashboard()" class="rounded-lg px-3 py-2 text-sm" style="background:#EFF3FA;border:1.5px solid #D1D9E6;color:#1A1A2E">
            <option value="all">All Faculty</option>${facultyOptions}
          </select>
        </div>
        <div class="flex flex-col gap-1">
          <label class="text-xs font-bold" style="color:#1A1A2E">Filter by Subject</label>
          <select onchange="adminFilterSubject=this.value;renderAdminDashboard()" class="rounded-lg px-3 py-2 text-sm" style="background:#EFF3FA;border:1.5px solid #D1D9E6;color:#1A1A2E">
            <option value="all">All Subjects</option>${subjectOptions}
          </select>
        </div>
        <div class="flex items-end">
          <button onclick="adminFilterFaculty='all';adminFilterSubject='all';renderAdminDashboard()" class="px-4 py-2 rounded-lg text-xs font-bold cursor-pointer" style="background:#EFF3FA;border:1.5px solid #D1D9E6;color:#003087">Reset Filters</button>
        </div>
        <div class="flex items-end">
          <button onclick="adminExportPDF()" class="px-4 py-2 rounded-lg text-xs font-bold text-white cursor-pointer" style="background:#003087">💾 Export PDF Report</button>
        </div>
      </div>

      <!-- Faculty Performance Table -->
      <div class="section-bar text-sm font-bold mb-3" style="color:#003087">Faculty Performance Overview</div>
      <div class="rounded-xl overflow-hidden border mb-8" style="border-color:#D1D9E6">
        <table class="w-full border-collapse text-sm">
          <thead><tr style="background:#003087">
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Faculty Name</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Faculty ID</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Evaluations</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Average Score</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Comments</th>
          </tr></thead>
          <tbody>${facultyRows || '<tr><td colspan="5" class="px-3 py-4 text-center text-sm" style="color:#6B7280">No evaluation data yet.</td></tr>'}</tbody>
        </table>
      </div>

      <!-- Subject Statistics Table -->
      <div class="section-bar text-sm font-bold mb-3" style="color:#003087">Subject-Based Statistics</div>
      <div class="rounded-xl overflow-hidden border mb-8" style="border-color:#D1D9E6">
        <table class="w-full border-collapse text-sm">
          <thead><tr style="background:#4a4a4a">
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Class Code</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Subject</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Description</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Faculty</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Evaluations</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Avg. Score</th>
          </tr></thead>
          <tbody>${subjectRows}</tbody>
        </table>
      </div>

      <!-- Faculty Management -->
      <div class="section-bar text-sm font-bold mb-3" style="color:#003087">Faculty Account Management</div>
      <div class="rounded-xl overflow-hidden border mb-4" style="border-color:#D1D9E6">
        <table class="w-full border-collapse text-sm">
          <thead><tr style="background:#4a4a4a">
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Faculty Name</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Faculty ID</th>
            <th class="text-white text-xs font-bold px-3 py-2 text-left">Actions</th>
          </tr></thead>
          <tbody>
            ${Object.entries(facultyStats).map(([id, stats]) => `<tr>
              <td class="px-3 py-2">${escHTML(stats.name)}</td>
              <td class="px-3 py-2">${id}</td>
              <td class="px-3 py-2"><button onclick="adminResetFacultyPw('${id}','${escHTML(stats.name)}')" class="px-3 py-1 rounded-lg text-xs font-bold cursor-pointer" style="background:#EFF3FA;border:1.5px solid #D1D9E6;color:#003087">Reset Password</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

function adminViewComments(facultyId) {
  const allEvals = Store.getAllEvalsForFaculty(facultyId);
  const stats = { name: SUBJECTS.find(s => s.facultyId === facultyId)?.faculty || facultyId };
  const commentsHTML = allEvals.length === 0
    ? '<div class="text-sm text-center py-4" style="color:#6B7280">No comments yet.</div>'
    : allEvals.map(ev => {
        const subj = SUBJECTS.find(s => s.classCode === ev.classCode);
        return `<div class="rounded-xl px-4 py-3 mb-2" style="background:#F9FAFB;border:1.5px solid #D1D9E6">
          <div class="text-xs font-bold mb-1" style="color:#003087">${subj ? escHTML(subj.subjectCode + ' — ' + subj.description) : 'Unknown'}</div>
          <div class="text-sm" style="color:#1A1A2E">${escHTML(ev.comments || '(No comment)')}</div>
        </div>`;
      }).join('');

  // Modal overlay
  const modal = document.createElement('div');
  modal.id = 'adminModal';
  modal.className = 'fixed inset-0 flex items-center justify-center z-50';
  modal.style.background = 'rgba(0,0,0,0.4)';
  modal.innerHTML = `<div class="rounded-2xl p-6 max-w-lg w-full mx-4 max-h-96 overflow-y-auto" style="background:white;border:1.5px solid #D1D9E6">
    <div class="flex justify-between items-center mb-4">
      <div class="text-sm font-bold" style="color:#003087">Anonymous Comments — ${escHTML(stats.name)}</div>
      <button onclick="document.getElementById('adminModal').remove()" class="text-xl font-bold cursor-pointer" style="background:none;border:none;color:#6B7280">×</button>
    </div>
    <div class="text-xs mb-3 p-2 rounded-lg" style="background:#E8F0FE;color:#003087">All comments are anonymous. Student identities are never disclosed.</div>
    ${commentsHTML}
  </div>`;
  document.body.appendChild(modal);
}

function adminResetFacultyPw(facultyId, name) {
  const newPw = prompt(`Reset password for ${name} (${facultyId}).\nEnter new password (min. 6 characters):`);
  if (!newPw) return;
  if (newPw.length < 6) { alert('Password must be at least 6 characters.'); return; }
  const users = Store.getUsers();
  const key = facultyId.toUpperCase();
  if (!users[key]) { alert('Faculty account not found.'); return; }
  users[key] = { ...users[key], passwordHash: simpleHash(newPw) };
  Store.setUsers(users);
  alert(`Password for ${name} has been reset successfully.`);
}

function adminExportPDF() {
  const allEvals = Store.getAllEvals();
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
    doc.setFillColor(0,48,135); doc.rect(0,0,297,22,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(255,215,0);
    doc.text('RIZAL TECHNOLOGICAL UNIVERSITY — ADMIN REPORT',148,9,{align:'center'});
    doc.setFontSize(9); doc.setTextColor(255,255,255);
    doc.text(`Faculty Evaluation Summary • ${SCHOOL_YEAR} • ${SEMESTER}`,148,16,{align:'center'});

    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(30,30,30);
    doc.text(`Total Submissions: ${allEvals.length}    Generated: ${new Date().toLocaleString()}`,14,28);

    // Faculty summary table
    const facStats = {};
    SUBJECTS.forEach(s => { if(!facStats[s.facultyId]) facStats[s.facultyId]={name:s.faculty,scores:[]}; });
    allEvals.forEach(ev => {
      const subj = SUBJECTS.find(s => s.classCode===ev.classCode);
      if(subj && facStats[subj.facultyId]) {
        const avg = ALL_CRITERIA.reduce((s,c)=>s+(ev.scores[c]||0),0)/ALL_CRITERIA.length;
        facStats[subj.facultyId].scores.push(avg);
      }
    });
    const rows = Object.entries(facStats).map(([id, s]) => {
      const avg = s.scores.length ? (s.scores.reduce((a,b)=>a+b,0)/s.scores.length).toFixed(2) : 'No data';
      return [s.name, id, s.scores.length.toString(), avg];
    });

    doc.autoTable({
      head:[['Faculty Name','Faculty ID','# Evaluations','Average Score (out of 5)']],
      body: rows, startY: 34,
      styles:{fontSize:9,cellPadding:3},
      headStyles:{fillColor:[0,48,135],textColor:[255,255,255],fontStyle:'bold'},
      alternateRowStyles:{fillColor:[249,250,251]}
    });
    doc.save(`RTU_Admin_Report_${SCHOOL_YEAR.replace(/[^a-z0-9]/gi,'_')}.pdf`);
  } catch(err) {
    alert('PDF export failed: ' + err.message);
  }
}

   LOGOUT
================================================================ */
function doLogout() {
  AppState.logout();
  renderLogin();
}

/* ================================================================
   BOOT
================================================================ */
seedAccounts();
renderLogin();
</script>
